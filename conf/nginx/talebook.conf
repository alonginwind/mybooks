
upstream tornado {
    server 127.0.0.1:8000;
}

# 多层nginx的情况下，X-Scheme可能已经被设置过了，需要判断下
map $http_x_scheme $req_scheme {
    # 有值，则透传
    default   $http_x_scheme;

    # 空白，则设置本地的scheme
    ""        $scheme;
}
# WebSocket connection upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
server {
    listen 80;
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /data/books/ssl/ssl.crt;
    ssl_certificate_key /data/books/ssl/ssl.key;

    index index.html;
    client_max_body_size 0;
    root /var/www/talebook/app/dist/;
    access_log  /data/log/nginx/talebook-access.log;
    error_log   /data/log/nginx/talebook-error.log;

    # 兼容 /opds 和 /opds/ 两种访问方式
    location = /opds {
        rewrite ^ /opds/ last;
    }

    # WebDAV 服务 - 必须在其他 location 之前！
    location /books {
        # 允许 WebDAV 方法
        # Note: nginx 需要 http_dav_module 支持 DAV 方法
        # 如果没有编译该模块，可以直接传递给后端处理

        proxy_pass       http://tornado;
        proxy_redirect   off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $req_scheme;
        proxy_set_header X-Real-IP $remote_addr;

        # WebDAV 需要的特殊 headers
        proxy_set_header Depth $http_depth;
        proxy_set_header Destination $http_destination;
        proxy_set_header Overwrite $http_overwrite;
        proxy_set_header Range $http_range;

        # 传递所有请求头
        proxy_pass_request_headers on;

        # 增加超时（WebDAV 操作可能较慢）
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;

        # 禁用缓存
        expires -1s;
    }

    location /podcast {
        proxy_pass       http://tornado;
        proxy_redirect   off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $req_scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        expires -1s;
    }

    location ~ ^/(api|get|read|opds|auth)/ {
        expires -1s;
        if ( $request_uri ~* ^/get/ ) {
            expires max;
        }
        proxy_pass       http://tornado;
        proxy_redirect   off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $req_scheme;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }

    # for spa mode
    # use `npm run build-spa` to generate dist/ dir
    location = /index.html {
        expires -1s;
    }
    try_files $uri $uri/index.html /index.html;
}
